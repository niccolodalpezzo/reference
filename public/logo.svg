<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Blue background -->
  <rect width="200" height="200" fill="#2200CC" rx="16"/>

  <!-- Network graph nodes and edges (subtle overlay) -->
  <g opacity="0.25" stroke="white" stroke-width="1" fill="none">
    <!-- edges -->
    <line x1="30" y1="60" x2="80" y2="40"/>
    <line x1="80" y1="40" x2="130" y2="55"/>
    <line x1="130" y1="55" x2="170" y2="35"/>
    <line x1="30" y1="60" x2="55" y2="100"/>
    <line x1="80" y1="40" x2="100" y2="90"/>
    <line x1="130" y1="55" x2="145" y2="100"/>
    <line x1="170" y1="35" x2="165" y2="85"/>
    <line x1="55" y1="100" x2="100" y2="90"/>
    <line x1="100" y1="90" x2="145" y2="100"/>
    <line x1="145" y1="100" x2="165" y2="85"/>
    <line x1="55" y1="100" x2="40" y2="140"/>
    <line x1="100" y1="90" x2="100" y2="140"/>
    <line x1="165" y1="85" x2="160" y2="140"/>
  </g>
  <g fill="white" opacity="0.35">
    <circle cx="30" cy="60" r="3"/>
    <circle cx="80" cy="40" r="3"/>
    <circle cx="130" cy="55" r="3"/>
    <circle cx="170" cy="35" r="3"/>
    <circle cx="55" cy="100" r="3"/>
    <circle cx="100" cy="90" r="3"/>
    <circle cx="145" cy="100" r="3"/>
    <circle cx="165" cy="85" r="3"/>
    <circle cx="40" cy="140" r="3"/>
    <circle cx="100" cy="140" r="3"/>
    <circle cx="160" cy="140" r="3"/>
  </g>

  <!-- NDP text -->
  <text
    x="100"
    y="128"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="68"
    fill="white"
    text-anchor="middle"
    letter-spacing="-2"
  >NDP</text>

  <!-- reference® text -->
  <text
    x="100"
    y="158"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="18"
    fill="white"
    text-anchor="middle"
    letter-spacing="4"
    opacity="0.9"
  >reference®</text>
</svg>
